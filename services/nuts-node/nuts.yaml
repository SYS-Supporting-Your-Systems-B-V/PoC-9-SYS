strictmode: false
# url: http://localhost:8081
url: https://__PUBLIC_DOMAIN__/nuts-oauth2
datadir: /data
didmethods: [web]

auth:
  authorizationendpoint:
    enabled: true

http:
  public:
    address: :8084
  internal:
    address: :8083

crypto:
  storage: fs

tls:
  certfile: /opt/nuts/certs/__PUBLIC_DOMAIN__.pem
  certkeyfile: /opt/nuts/certs/__PUBLIC_DOMAIN__.key
  truststorefile: /opt/nuts/certs/__PUBLIC_DOMAIN__-chain.pem

policy:
  directory: /opt/nuts/policies
